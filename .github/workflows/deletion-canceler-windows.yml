name: Build Unified Rust CLI

on:
  # Allow manual triggering from the GitHub UI
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show rustc version
        run: rustc -Vv

      - name: Build esl_unified_rs (release)
        working-directory: esl_unified_rs
        run: |
          cargo build --release

      - name: Verify built binary
        run: |
          ls -la esl_unified_rs/target/release/

      - name: "Upload artifact: esl_unified_rs (Linux)"
        uses: actions/upload-artifact@v4
        with:
          name: esl_unified_rs-linux-x86_64
          path: |
            esl_unified_rs/target/release/esl_unified_rs
          if-no-files-found: error

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show rustc version
        run: rustc -Vv

      - name: Build esl_unified_rs (release)
        working-directory: esl_unified_rs
        run: |
          cargo build --release

      - name: Verify built binary
        run: |
          ls -la esl_unified_rs/target/release/

      - name: Rename macOS binary for artifact
        run: |
          cp esl_unified_rs/target/release/esl_unified_rs esl_unified_rs/target/release/esl_unified_rs_mac

      - name: "Upload artifact: esl_unified_rs (macOS)"
        uses: actions/upload-artifact@v4
        with:
          name: esl_unified_rs-macos
          path: |
            esl_unified_rs/target/release/esl_unified_rs_mac
          if-no-files-found: error

  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Show rustc version
        run: rustc -Vv

      - name: Build esl_unified_rs (release)
        working-directory: esl_unified_rs
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify built binary
        run: |
          ls -la esl_unified_rs/target/x86_64-pc-windows-msvc/release/

      - name: "Upload artifact: esl_unified_rs (Windows)"
        uses: actions/upload-artifact@v4
        with:
          name: esl_unified_rs-windows-x86_64
          path: |
            esl_unified_rs/target/x86_64-pc-windows-msvc/release/esl_unified_rs.exe
          if-no-files-found: error
