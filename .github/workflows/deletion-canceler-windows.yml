name: Build Rust Binaries

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Show rustc version
        run: rustc -Vv

      - name: Build esl-psc (release)
        working-directory: esl_psc_rs
        run: cargo build --release

      - name: Verify built binaries
        run: ls -la esl_psc_rs/target/release/

      - name: Stage toolkit (Linux)
        run: |
          python packaging/toolkit/stage_toolkit.py \
            --dest dist/esl-psc-toolkit \
            --rust-main esl_psc_rs/target/release/esl-psc \
            --platform posix
          tar -czf esl-psc-toolkit-linux-x86_64.tar.gz -C dist esl-psc-toolkit

      - name: "Upload artifact: esl-psc (Linux)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc-linux-x86_64
          path: esl_psc_rs/target/release/esl-psc
          if-no-files-found: error

      - name: "Upload artifact: ESL-PSC toolkit (Linux)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc-toolkit-linux-x86_64
          path: esl-psc-toolkit-linux-x86_64.tar.gz
          if-no-files-found: error

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Show rustc version
        run: rustc -Vv

      - name: Build esl-psc (release)
        working-directory: esl_psc_rs
        run: cargo build --release

      - name: Verify built binaries
        run: ls -la esl_psc_rs/target/release/

      - name: Stage toolkit (macOS)
        run: |
          python packaging/toolkit/stage_toolkit.py \
            --dest dist/esl-psc-toolkit \
            --rust-main esl_psc_rs/target/release/esl-psc \
            --platform posix
          tar -czf esl-psc-toolkit-macos.tar.gz -C dist esl-psc-toolkit

      - name: "Upload artifact: esl-psc (macOS)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc-macos
          path: esl_psc_rs/target/release/esl-psc
          if-no-files-found: error

      - name: "Upload artifact: ESL-PSC toolkit (macOS)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc-toolkit-macos
          path: esl-psc-toolkit-macos.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Show rustc version
        run: rustc -Vv

      - name: Build esl-psc (release)
        working-directory: esl_psc_rs
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify built binaries
        run: ls -la esl_psc_rs/target/x86_64-pc-windows-msvc/release/

      - name: Stage toolkit (Windows)
        shell: pwsh
        run: |
          python "$env:GITHUB_WORKSPACE\packaging\toolkit\stage_toolkit.py" `
            --dest "$env:GITHUB_WORKSPACE\dist\esl-psc-toolkit" `
            --rust-main "$env:GITHUB_WORKSPACE\esl_psc_rs\target\x86_64-pc-windows-msvc\release\esl-psc.exe" `
            --platform windows
          Compress-Archive -Path "$env:GITHUB_WORKSPACE\dist\esl-psc-toolkit\*" -DestinationPath "$env:GITHUB_WORKSPACE\esl-psc-toolkit-windows-x86_64.zip"

      - name: "Upload artifact: esl-psc (Windows)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc-windows-x86_64
          path: esl_psc_rs/target/x86_64-pc-windows-msvc/release/esl-psc.exe
          if-no-files-found: error

      - name: "Upload artifact: ESL-PSC toolkit (Windows)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc-toolkit-windows-x86_64
          path: esl-psc-toolkit-windows-x86_64.zip
          if-no-files-found: error
