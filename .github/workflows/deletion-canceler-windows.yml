name: Build Rust Binaries

on:
  # Allow manual triggering from the GitHub UI
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show rustc version
        run: rustc -Vv

      - name: Build esl-psc_cli (release)
        working-directory: esl_unified_rs
        run: |
          cargo build --release

      - name: Build site_counter_rs (release)
        working-directory: fast_scan_rs
        run: |
          cargo build --release

      - name: Verify built binaries
        run: |
          ls -la esl_unified_rs/target/release/
          ls -la fast_scan_rs/target/release/

      - name: "Upload artifact: esl-psc_cli (Linux)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc_cli-linux-x86_64
          path: |
            esl_unified_rs/target/release/esl-psc_cli
          if-no-files-found: error

      - name: "Upload artifact: site_counter_rs (Linux)"
        uses: actions/upload-artifact@v4
        with:
          name: site_counter_rs-linux-x86_64
          path: |
            fast_scan_rs/target/release/site_counter_rs
          if-no-files-found: error

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show rustc version
        run: rustc -Vv

      - name: Build esl-psc_cli (release)
        working-directory: esl_unified_rs
        run: |
          cargo build --release

      - name: Build site_counter_rs (release)
        working-directory: fast_scan_rs
        run: |
          cargo build --release

      - name: Verify built binaries
        run: |
          ls -la esl_unified_rs/target/release/
          ls -la fast_scan_rs/target/release/

      - name: Rename macOS binaries for artifacts
        run: |
          cp esl_unified_rs/target/release/esl-psc_cli esl_unified_rs/target/release/esl-psc_cli_mac
          cp fast_scan_rs/target/release/site_counter_rs fast_scan_rs/target/release/site_counter_rs_mac

      - name: "Upload artifact: esl-psc_cli (macOS)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc_cli-macos
          path: |
            esl_unified_rs/target/release/esl-psc_cli_mac
          if-no-files-found: error

      - name: "Upload artifact: site_counter_rs (macOS)"
        uses: actions/upload-artifact@v4
        with:
          name: site_counter_rs-macos
          path: |
            fast_scan_rs/target/release/site_counter_rs_mac
          if-no-files-found: error

  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Show rustc version
        run: rustc -Vv

      - name: Build esl-psc_cli (release)
        working-directory: esl_unified_rs
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Build site_counter_rs (release)
        working-directory: fast_scan_rs
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify built binaries
        run: |
          ls -la esl_unified_rs/target/x86_64-pc-windows-msvc/release/
          ls -la fast_scan_rs/target/x86_64-pc-windows-msvc/release/

      - name: "Upload artifact: esl-psc_cli (Windows)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc_cli-windows-x86_64
          path: |
            esl_unified_rs/target/x86_64-pc-windows-msvc/release/esl-psc_cli.exe
          if-no-files-found: error

      - name: "Upload artifact: site_counter_rs (Windows)"
        uses: actions/upload-artifact@v4
        with:
          name: site_counter_rs-windows-x86_64
          path: |
            fast_scan_rs/target/x86_64-pc-windows-msvc/release/site_counter_rs.exe
          if-no-files-found: error
