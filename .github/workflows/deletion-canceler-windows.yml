name: Build Rust Binaries

on:
  # Allow manual triggering from the GitHub UI
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install toolkit helper dependencies
        run: |
          pip install -r requirements-toolkit.txt
          pip install nuitka

      - name: Show rustc version
        run: rustc -Vv

      - name: Build esl-psc (release)
        working-directory: esl_psc_rs
        run: |
          cargo build --release

      - name: Build site_counter_rs (release)
        working-directory: fast_scan_rs
        run: |
          cargo build --release

      - name: Verify built binaries
        run: |
          ls -la esl_psc_rs/target/release/
          ls -la fast_scan_rs/target/release/

      - name: Build toolkit helper CLIs (Linux)
        run: |
          mkdir -p toolkit_helpers
          python -m nuitka --onefile --assume-yes-for-downloads --output-dir=toolkit_helpers --output-filename esl-psc-plot esl_psc_cli/plot_cli.py
          python -m nuitka --onefile --assume-yes-for-downloads --output-dir=toolkit_helpers --output-filename esl-psc-pairs esl_psc_cli/auto_pairs_cli.py
          python -m nuitka --onefile --assume-yes-for-downloads --output-dir=toolkit_helpers --output-filename site-counter esl_psc_cli/fast_scan_cli.py
          ls -la toolkit_helpers

      - name: Package toolkit (Linux)
        run: |
          mkdir -p dist/esl-psc-toolkit/bin
          cp esl_psc_rs/target/release/esl-psc dist/esl-psc-toolkit/bin/esl-psc
          cp fast_scan_rs/target/release/site_counter_rs dist/esl-psc-toolkit/bin/site_counter_rs
          cp toolkit_helpers/esl-psc-plot dist/esl-psc-toolkit/bin/esl-psc-plot
          cp toolkit_helpers/esl-psc-pairs dist/esl-psc-toolkit/bin/esl-psc-pairs
          cp toolkit_helpers/site-counter dist/esl-psc-toolkit/bin/site-counter
          cp packaging/toolkit/README.md dist/esl-psc-toolkit/README.md
          chmod +x dist/esl-psc-toolkit/bin/*
          tar -czf esl-psc-toolkit-linux-x86_64.tar.gz -C dist esl-psc-toolkit

      - name: "Upload artifact: esl-psc (Linux)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc-linux-x86_64
          path: |
            esl_psc_rs/target/release/esl-psc
          if-no-files-found: error

      - name: "Upload artifact: site_counter_rs (Linux)"
        uses: actions/upload-artifact@v4
        with:
          name: site_counter_rs-linux-x86_64
          path: |
            fast_scan_rs/target/release/site_counter_rs
          if-no-files-found: error

      - name: "Upload artifact: ESL-PSC toolkit (Linux)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc-toolkit-linux-x86_64
          path: |
            esl-psc-toolkit-linux-x86_64.tar.gz
          if-no-files-found: error

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show rustc version
        run: rustc -Vv

      - name: Build esl-psc (release)
        working-directory: esl_psc_rs
        run: |
          cargo build --release

      - name: Build site_counter_rs (release)
        working-directory: fast_scan_rs
        run: |
          cargo build --release

      - name: Verify built binaries
        run: |
          ls -la esl_psc_rs/target/release/
          ls -la fast_scan_rs/target/release/

      - name: "Upload artifact: esl-psc (macOS)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc-macos
          path: |
            esl_psc_rs/target/release/esl-psc
          if-no-files-found: error

      - name: "Upload artifact: site_counter_rs (macOS)"
        uses: actions/upload-artifact@v4
        with:
          name: site_counter_rs-macos
          path: |
            fast_scan_rs/target/release/site_counter_rs
          if-no-files-found: error

  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Show rustc version
        run: rustc -Vv

      - name: Build esl-psc (release)
        working-directory: esl_psc_rs
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Build site_counter_rs (release)
        working-directory: fast_scan_rs
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify built binaries
        run: |
          ls -la esl_psc_rs/target/x86_64-pc-windows-msvc/release/
          ls -la fast_scan_rs/target/x86_64-pc-windows-msvc/release/

      - name: "Upload artifact: esl-psc (Windows)"
        uses: actions/upload-artifact@v4
        with:
          name: esl-psc-windows-x86_64
          path: |
            esl_psc_rs/target/x86_64-pc-windows-msvc/release/esl-psc.exe
          if-no-files-found: error

      - name: "Upload artifact: site_counter_rs (Windows)"
        uses: actions/upload-artifact@v4
        with:
          name: site_counter_rs-windows-x86_64
          path: |
            fast_scan_rs/target/x86_64-pc-windows-msvc/release/site_counter_rs.exe
          if-no-files-found: error
