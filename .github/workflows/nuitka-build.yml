name: Build Nuitka Distributables

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/nuitka-build.yml
  workflow_dispatch:
    inputs:
      target_os:
        description: "Platform to build"
        required: true
        type: choice
        default: macos_apple_silicon
        options:
          - macos_apple_silicon
          - windows
          - linux_gui
          - linux_toolkit
      upload_to_release:
        description: "Upload macOS assets to the release after building"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Release tag to upload to; defaults to v<package version>"
        required: false
        type: string
        default: ""

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-linux-toolkit:
    if: ${{ github.event.inputs.target_os == 'linux_toolkit' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install toolkit Python dependencies
        run: |
          pip install -r requirements-toolkit.txt
      - name: Build Rust binaries
        run: |
          cargo build --release --manifest-path esl_psc_rs/Cargo.toml
      - name: Stage toolkit artifact
        run: |
          python packaging/toolkit/package_toolkit.py \
            --dest-dir dist \
            --rust-main esl_psc_rs/target/release/esl-psc \
            --platform posix \
            --os-tag linux \
            --arch x86_64 \
            --git-sha "${{ github.sha }}"
      - name: Smoke-test toolkit artifact
        run: |
          python packaging/toolkit/smoke_test_toolkit.py \
            --artifact "$(ls dist/esl-psc-toolkit-v*-linux-x86_64.tar.gz)"
      - uses: actions/upload-artifact@v4
        with:
          name: esl-psc-toolkit-linux-x86_64
          path: |
            dist/esl-psc-toolkit-v*-linux-x86_64.tar.gz
            dist/esl-psc-toolkit-v*-linux-x86_64.tar.gz.sha256
            dist/esl-psc-toolkit-v*-linux-x86_64.tar.gz.manifest.json

  build-linux-gui:
    if: ${{ github.event.inputs.target_os == 'linux_gui' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements-gui.txt
          pip install nuitka
      - name: Build Rust binaries
        run: |
          cargo build --release --manifest-path esl_psc_rs/Cargo.toml
      - name: Stage runtime helpers
        run: |
          mkdir -p stage
          cp bin/preprocess stage/preprocess
          cp bin/sg_lasso stage/sg_lasso
          cp bin/sg_lasso_leastr stage/sg_lasso_leastr
          cp bin/deletion_canceler stage/deletion_canceler
          cp esl_psc_rs/target/release/esl-psc stage/esl-psc
          chmod +x stage/*
      - name: Build GUI with Nuitka (standalone)
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: gui/main.py
          mode: standalone
          output-dir: build
          lto: "yes"
          no-deployment-flag: self-execution
          enable-plugins: |
            pyside6
            matplotlib
          nofollow-import-to: "*.tests"
          include-raw-dir: stage=bin
      - name: Build Linux GUI Debian package
        run: |
          DIST_DIR="$(find build -maxdepth 1 -type d -name '*.dist' | head -n 1)"
          if [ -z "${DIST_DIR}" ]; then
            echo "Failed to locate Nuitka .dist directory" >&2
            exit 1
          fi

          python packaging/gui/build_deb.py \
            --dist-dir "${DIST_DIR}" \
            --dest-dir dist/gui \
            --arch amd64
      - uses: actions/upload-artifact@v4
        with:
          name: ESL-PSC-Linux-GUI-deb
          path: |
            dist/gui/esl-psc-gui_*.deb
            dist/gui/esl-psc-gui_*.deb.sha256

  build-macos-apple-silicon:
    if: ${{ github.event.inputs.target_os == 'macos_apple_silicon' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements-gui.txt
          pip install nuitka
      - name: Build Rust binaries
        run: |
          cargo build --release --manifest-path esl_psc_rs/Cargo.toml
      - name: Detect release version
        id: version
        run: |
          version="$(python -c 'import tomllib; from pathlib import Path; data = tomllib.loads(Path("esl_psc_rs/Cargo.toml").read_text(encoding="utf-8")); print(data["package"]["version"])')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - name: Build GUI with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: gui/main.py
          mode: app
          output-dir: build
          lto: "no"
          no-deployment-flag: self-execution
          enable-plugins: |
            pyside6
            matplotlib
          nofollow-import-to: "*.tests"
          macos-app-icon: assets/icons/app.icns
      - name: Rename .app bundle
        run: mv build/main.app build/ESL-PSC.app
      - name: Add runtime helpers to app bundle
        run: |
          mkdir -p build/ESL-PSC.app/Contents/MacOS/bin
          cp bin/preprocess_mac build/ESL-PSC.app/Contents/MacOS/bin/preprocess_mac
          cp bin/sg_lasso_mac build/ESL-PSC.app/Contents/MacOS/bin/sg_lasso_mac
          # Linear-regression backend for continuous phenotypes
          cp bin/sg_lasso_leastr_mac build/ESL-PSC.app/Contents/MacOS/bin/sg_lasso_leastr_mac
          cp bin/deletion_canceler_mac build/ESL-PSC.app/Contents/MacOS/bin/deletion_canceler_mac
          cp esl_psc_rs/target/release/esl-psc build/ESL-PSC.app/Contents/MacOS/bin/esl-psc
          chmod +x build/ESL-PSC.app/Contents/MacOS/bin/*
      - name: Validate macOS signing secrets
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        env:
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          missing=0
          for name in \
            MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 \
            MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD \
            MACOS_CODESIGN_IDENTITY \
            APPLE_ID \
            APPLE_TEAM_ID \
            APPLE_APP_SPECIFIC_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required macOS signing secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"
      - name: Import macOS signing certificate
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        env:
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="${RUNNER_TEMP}/developer_id_application.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$(uuidgen)}"

          echo "${MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64}" | base64 --decode > "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" \
            -P "${MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${KEYCHAIN_PATH}"
          security list-keychain -d user -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"
      - name: Code sign macOS app
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          codesign --force --deep --options runtime --timestamp \
            --sign "${MACOS_CODESIGN_IDENTITY}" \
            build/ESL-PSC.app
          codesign --verify --deep --strict --verbose=2 build/ESL-PSC.app
      - name: Code sign macOS toolkit executable
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          codesign --force --options runtime --timestamp \
            --sign "${MACOS_CODESIGN_IDENTITY}" \
            esl_psc_rs/target/release/esl-psc
          codesign --verify --strict --verbose=2 esl_psc_rs/target/release/esl-psc
      - name: Stage toolkit artifact
        run: |
          python packaging/toolkit/package_toolkit.py \
            --dest-dir dist \
            --rust-main esl_psc_rs/target/release/esl-psc \
            --platform posix \
            --os-tag macos \
            --arch arm64 \
            --git-sha "${{ github.sha }}"
      - name: Smoke-test toolkit artifact
        run: |
          python packaging/toolkit/smoke_test_toolkit.py \
            --artifact "$(ls dist/esl-psc-toolkit-v*-macos-arm64.tar.gz)"
      - name: Verify signed macOS toolkit artifact
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        run: |
          VERIFY_DIR="$(mktemp -d)"
          tar -xzf "$(ls dist/esl-psc-toolkit-v*-macos-arm64.tar.gz)" -C "${VERIFY_DIR}"
          codesign --verify --strict --verbose=2 "${VERIFY_DIR}/esl-psc-toolkit/bin/esl-psc"
      - name: Create DMG
        run: |
          mkdir -p dist/gui
          DMG_PATH="dist/gui/ESL-PSC-v${{ steps.version.outputs.version }}-macOS.dmg"
          for attempt in 1 2 3 4 5; do
            if hdiutil create -volname "ESL-PSC" \
                             -srcfolder build/ESL-PSC.app \
                             -ov -format UDZO "${DMG_PATH}"; then
              exit 0
            fi
            status=$?
            hdiutil detach "/Volumes/ESL-PSC" -force || true
            sleep $((attempt * 10))
          done
          exit "${status}"
      - name: Code sign macOS DMG
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          codesign --force --timestamp \
            --sign "${MACOS_CODESIGN_IDENTITY}" \
            "dist/gui/ESL-PSC-v${{ steps.version.outputs.version }}-macOS.dmg"
          codesign --verify --verbose=2 "dist/gui/ESL-PSC-v${{ steps.version.outputs.version }}-macOS.dmg"
      - name: Notarize and staple macOS DMG
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          DMG_PATH="dist/gui/ESL-PSC-v${{ steps.version.outputs.version }}-macOS.dmg"
          xcrun notarytool submit "${DMG_PATH}" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --wait
          xcrun stapler staple "${DMG_PATH}"
          xcrun stapler validate "${DMG_PATH}"
          spctl --assess --type open --context context:primary-signature --verbose=4 "${DMG_PATH}"
      - uses: actions/upload-artifact@v4
        with:
          name: ESL-PSC-macOS
          path: dist/gui/ESL-PSC-v*-macOS.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: esl-psc-toolkit-macos-arm64
          path: |
            dist/esl-psc-toolkit-v*-macos-arm64.tar.gz
            dist/esl-psc-toolkit-v*-macos-arm64.tar.gz.sha256
            dist/esl-psc-toolkit-v*-macos-arm64.tar.gz.manifest.json
      - name: Upload macOS assets to GitHub release
        if: ${{ github.event_name == 'push' || github.event.inputs.upload_to_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_tag="${{ github.event.inputs.release_tag }}"
          if [ -z "${release_tag}" ]; then
            release_tag="v${{ steps.version.outputs.version }}"
          fi

          gh release upload "${release_tag}" \
            --repo "${{ github.repository }}" \
            --clobber \
            dist/gui/ESL-PSC-v*-macOS.dmg \
            dist/esl-psc-toolkit-v*-macos-arm64.tar.gz \
            dist/esl-psc-toolkit-v*-macos-arm64.tar.gz.sha256 \
            dist/esl-psc-toolkit-v*-macos-arm64.tar.gz.manifest.json

  build-windows:
    if: ${{ github.event.inputs.target_os == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements-gui.txt
          pip install nuitka
      - name: Build Rust binaries
        shell: bash
        run: |
          cargo build --release --target x86_64-pc-windows-msvc --manifest-path esl_psc_rs/Cargo.toml
      - name: Stage and verify Windows binaries
        shell: pwsh
        run: |
          $SourceDir = "$env:GITHUB_WORKSPACE\bin"
          $RustUnified = "$env:GITHUB_WORKSPACE\esl_psc_rs\target\x86_64-pc-windows-msvc\release\esl-psc.exe"
          $StageDir = "$env:GITHUB_WORKSPACE\stage"

          if (-not (Test-Path -Path "$SourceDir\preprocess.exe")) {
            Get-ChildItem -Path $SourceDir
            throw "FATAL: Cannot find preprocess.exe in the source directory."
          }

          New-Item -ItemType Directory -Force -Path $StageDir | Out-Null

          Copy-Item -Path "$SourceDir\preprocess.exe" -Destination $StageDir
          Copy-Item -Path "$SourceDir\sg_lasso.exe" -Destination $StageDir
          Copy-Item -Path "$SourceDir\sg_lasso_leastr.exe" -Destination $StageDir
          Copy-Item -Path "$SourceDir\deletion_canceler.exe" -Destination $StageDir
          Copy-Item -Path $RustUnified -Destination $StageDir
          Copy-Item -Path "$SourceDir\libopenblas.dll" -Destination $StageDir -Force
          Copy-Item -Path "$SourceDir\liblapack.dll" -Destination $StageDir -Force

          Get-ChildItem -Path $StageDir
          if (-not (Test-Path -Path "$StageDir\preprocess.exe")) {
            throw "FATAL: stage verification failed; preprocess.exe missing."
          }
      - name: Stage toolkit artifact
        shell: pwsh
        run: |
          python "$env:GITHUB_WORKSPACE\packaging\toolkit\package_toolkit.py" `
            --dest-dir "$env:GITHUB_WORKSPACE\dist" `
            --rust-main "$env:GITHUB_WORKSPACE\esl_psc_rs\target\x86_64-pc-windows-msvc\release\esl-psc.exe" `
            --platform windows `
            --os-tag windows `
            --arch x86_64 `
            --git-sha "${{ github.sha }}"
      - name: Smoke-test toolkit artifact
        shell: pwsh
        run: |
          $artifact = (Get-ChildItem "$env:GITHUB_WORKSPACE\dist\esl-psc-toolkit-v*-windows-x86_64.zip" | Select-Object -First 1).FullName
          python "$env:GITHUB_WORKSPACE\packaging\toolkit\smoke_test_toolkit.py" --artifact $artifact
      - name: Build GUI with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: gui/main.py
          mode: onefile
          output-dir: build
          lto: "yes"
          no-deployment-flag: self-execution
          enable-plugins: |
            pyside6
            matplotlib
          nofollow-import-to: "*.tests"
          windows-icon-from-ico: assets/icons/app.ico
          windows-console-mode: disable
          include-raw-dir: stage=bin
      - name: Rename executable
        run: move build\\main.exe build\\ESL-PSC.exe
        shell: pwsh
      - name: Compress GUI build to ZIP
        shell: pwsh
        run: Compress-Archive -Path build\\ESL-PSC.exe -DestinationPath ESL-PSC-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ESL-PSC-Windows
          path: ESL-PSC-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: esl-psc-toolkit-windows-x86_64
          path: |
            dist/esl-psc-toolkit-v*-windows-x86_64.zip
            dist/esl-psc-toolkit-v*-windows-x86_64.zip.sha256
            dist/esl-psc-toolkit-v*-windows-x86_64.zip.manifest.json
