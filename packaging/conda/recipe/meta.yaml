{% set version = "2.5.0" %}

package:
  name: esl-psc
  version: {{ version }}

source:
  path: ../../..

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
  host:
    - python >=3.10
  run:
    - python >=3.10
    - numpy >=1.20.0
    - pandas >=1.3.0
    - matplotlib >=3.4.0
    - seaborn >=0.11.0
    - biopython >=1.85.0

test:
  commands:
    - esl-psc --help
    - esl-psc pairs --help
    - esl-psc site-counter --help
    - esl-psc plot --help
    - python -c "import esl_psc_cli"
    - python -c "import gui.core.fast_scan"

about:
  summary: Evolutionary Sparse Learning with Paired Species Contrast (ESL-PSC)
  license: MIT
  license_file: LICENSE
  home: https://github.com/John-Allard/ESL-PSC
